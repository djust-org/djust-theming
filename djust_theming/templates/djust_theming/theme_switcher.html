{# Theme switcher component template #}
<div class="{{ css_prefix }}theme-switcher {{ dropdown_class }}" data-theme-switcher>
    {% if show_mode_toggle %}
    <div class="{{ css_prefix }}theme-mode-controls">
        <button type="button"
                class="{{ css_prefix }}theme-mode-btn {{ button_class }}{% if theme_mode == 'light' %} active{% endif %}"
                {% if liveview %}dj-click="set_theme_mode" data-dj-mode="light"{% else %}data-djust-event="set_theme_mode" data-djust-params='{"mode": "light"}'{% endif %}
                aria-label="Light mode"
                title="Light mode">
            {# Sun icon #}
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            {% if show_labels %}<span>Light</span>{% endif %}
        </button>

        <button type="button"
                class="{{ css_prefix }}theme-mode-btn {{ button_class }}{% if theme_mode == 'dark' %} active{% endif %}"
                {% if liveview %}dj-click="set_theme_mode" data-dj-mode="dark"{% else %}data-djust-event="set_theme_mode" data-djust-params='{"mode": "dark"}'{% endif %}
                aria-label="Dark mode"
                title="Dark mode">
            {# Moon icon #}
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            {% if show_labels %}<span>Dark</span>{% endif %}
        </button>

        <button type="button"
                class="{{ css_prefix }}theme-mode-btn {{ button_class }}{% if theme_mode == 'system' %} active{% endif %}"
                {% if liveview %}dj-click="set_theme_mode" data-dj-mode="system"{% else %}data-djust-event="set_theme_mode" data-djust-params='{"mode": "system"}'{% endif %}
                aria-label="System preference"
                title="Follow system preference">
            {# Monitor icon #}
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            {% if show_labels %}<span>System</span>{% endif %}
        </button>
    </div>
    {% endif %}

    {% if show_presets and presets %}
    <div class="{{ css_prefix }}theme-preset-controls">
        <select class="{{ css_prefix }}theme-preset-select {{ dropdown_class }}"
                {% if liveview %}dj-change="set_theme_preset"{% else %}data-djust-event="set_theme_preset" data-djust-value-key="preset"{% endif %}
                aria-label="Select theme">
            {% for preset in presets %}
            <option value="{{ preset.name }}"{% if preset.is_active %} selected{% endif %}>
                {{ preset.display_name }}
            </option>
            {% endfor %}
        </select>
    </div>
    {% endif %}
</div>
