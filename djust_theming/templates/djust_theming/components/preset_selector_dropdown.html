{# Preset selector: dropdown layout #}
<select class="theme-preset-select {{ dropdown_class }}"
        data-djust-event="set_theme_preset"
        data-djust-value-key="preset">
    {% for preset in presets %}
    <option value="{{ preset.name }}"{% if preset.is_active %} selected{% endif %}>{{ preset.display_name }}</option>
    {% endfor %}
</select>
