<div class="{{ css_prefix }}card {{ css_prefix }}card-decorated {% if attrs.class %}{{ attrs.class }}{% endif %}"
     {% if attrs.id %}id="{{ attrs.id }}"{% endif %}>
    <svg class="{{ css_prefix }}card-corner {{ css_prefix }}card-corner-tl" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="currentColor" opacity="0.3"/></svg>
    <svg class="{{ css_prefix }}card-corner {{ css_prefix }}card-corner-tr" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="currentColor" opacity="0.3"/></svg>
    <svg class="{{ css_prefix }}card-corner {{ css_prefix }}card-corner-bl" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="currentColor" opacity="0.3"/></svg>
    <svg class="{{ css_prefix }}card-corner {{ css_prefix }}card-corner-br" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="currentColor" opacity="0.3"/></svg>
    {% if slot_header %}
    <div class="{{ css_prefix }}card-header">
        {{ slot_header|safe }}
    </div>
    {% elif title %}
    <div class="{{ css_prefix }}card-header">
        <h3 class="{{ css_prefix }}card-title">{{ title }}</h3>
    </div>
    {% endif %}
    <div class="{{ css_prefix }}card-body">
        {% if slot_body %}{{ slot_body|safe }}{% else %}{{ content }}{% endif %}
    </div>
    {% if slot_footer %}
    <div class="{{ css_prefix }}card-footer">
        {{ slot_footer|safe }}
    </div>
    {% elif footer %}
    <div class="{{ css_prefix }}card-footer">
        {{ footer }}
    </div>
    {% endif %}
</div>
