<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Theme Diff</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }

    .diff-toolbar {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #fafafa;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .diff-toolbar h1 { font-size: 1rem; font-weight: 600; white-space: nowrap; }

    .diff-selector {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .diff-selector label { font-size: 0.8125rem; font-weight: 500; color: #6b7280; }
    .diff-selector select {
      padding: 0.375rem 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      font-size: 0.8125rem;
      background: white;
    }

    .diff-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      min-height: 0;
    }
    .diff-panel { position: relative; overflow: hidden; }
    .diff-panel:first-child { border-inline-end: 2px solid #e5e7eb; }
    .diff-panel-label {
      position: absolute;
      top: 0.5rem;
      inset-inline-start: 0.75rem;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 0.25rem 0.625rem;
      border-radius: 0.25rem;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      pointer-events: none;
    }
    .diff-panel iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 768px) {
      .diff-panels { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .diff-panel:first-child { border-inline-end: none; border-bottom: 2px solid #e5e7eb; }
    }
  </style>
</head>
<body>
  <div class="diff-toolbar">
    <h1>Theme Diff</h1>
    <form method="get" style="display:flex;gap:1.5rem;align-items:center;">
      <div class="diff-selector">
        <label for="left-select">Left:</label>
        <select id="left-select" name="left" onchange="this.form.submit()">
          {% for preset in presets %}
          <option value="{{ preset.name }}" {% if preset.name == left_preset %}selected{% endif %}>{{ preset.display_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="diff-selector">
        <label for="right-select">Right:</label>
        <select id="right-select" name="right" onchange="this.form.submit()">
          {% for preset in presets %}
          <option value="{{ preset.name }}" {% if preset.name == right_preset %}selected{% endif %}>{{ preset.display_name }}</option>
          {% endfor %}
        </select>
      </div>
    </form>
  </div>

  <div class="diff-panels">
    <div class="diff-panel">
      <span class="diff-panel-label">{{ left_preset }}</span>
      <iframe src="../?preset={{ left_preset }}" title="Left preset: {{ left_preset }}"></iframe>
    </div>
    <div class="diff-panel">
      <span class="diff-panel-label">{{ right_preset }}</span>
      <iframe src="../?preset={{ right_preset }}" title="Right preset: {{ right_preset }}"></iframe>
    </div>
  </div>
</body>
</html>
