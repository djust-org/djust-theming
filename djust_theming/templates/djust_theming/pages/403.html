<div class="{{ css_prefix }}page-error {{ css_prefix }}page-403 {% if attrs.class %}{{ attrs.class }}{% endif %}">
    <div class="{{ css_prefix }}page-error-code">403</div>
    <h1 class="{{ css_prefix }}page-title">{{ title }}</h1>
    <p class="{{ css_prefix }}page-description">{{ description }}</p>
    <div class="{{ css_prefix }}page-actions">
        <a href="{{ back_url }}" class="{{ css_prefix }}btn {{ css_prefix }}btn-primary {{ css_prefix }}btn-md">Go back</a>
    </div>
</div>
